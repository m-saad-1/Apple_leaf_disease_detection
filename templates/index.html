<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple Leaf Disease Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: Arial; background:#f7f7f7; padding:50px; text-align:center; }
        .container { background:white; padding:30px; border-radius:10px; display:inline-block; max-width:500px; box-shadow:0 0 15px rgba(0,0,0,0.1);}
        input[type="file"] { margin: 20px 0; }
        #preview { max-width: 300px; border-radius:10px; margin-top:20px; }
        .note { font-weight: bold; margin-top:10px; }
        .success { color: green; }
        .warning { color: orange; }
        .error { color: red; }
        .metric { font-size:18px; margin:5px 0; }
        #result-container { margin-top:20px; display:none; }
        #loader { display:none; margin-top:10px; }
        button { padding:10px 20px; font-size:16px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; }
        button:hover { background:#45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apple Leaf Disease Detection</h1>
        <div id="error-msg" class="error"></div>

        <form id="leaf-form">
            <input type="file" name="leaf_image" id="leaf_image" accept="image/*" required>
            <br>
            <img id="preview" src="" alt="Image Preview">
            <br>
            <div id="loader">Predicting... <span>⏳</span></div>
            <button type="submit">Predict</button>
        </form>

        <div id="result-container">
            <div class="metric">Disease: <strong id="disease"></strong></div>
            <div class="metric">Confidence: <strong id="confidence"></strong></div>
            <div class="metric">Margin: <strong id="margin"></strong></div>
            <div id="note" class="note"></div>
        </div>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const fileInput = document.getElementById('leaf_image');
        const resultContainer = document.getElementById('result-container');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('error-msg');
        const submitButton = document.querySelector('button');

        function displayResult(data){
            resultContainer.style.display = 'block';
            document.getElementById('disease').innerText = data.disease;
            document.getElementById('confidence').innerText = data.confidence.toFixed(2);
            document.getElementById('margin').innerText = data.margin.toFixed(2);

            const noteEl = document.getElementById('note');
            if(data.disease === "Unknown / Not Apple Leaf"){
                noteEl.innerText = data.note;
                noteEl.className = "note error";
            } else if(data.note){
                noteEl.innerText = data.note;
                noteEl.className = "note warning";
            } else {
                noteEl.innerText = "Prediction is reliable";
                noteEl.className = "note success";
            }
        }

        function previewFileAndPredict(){
            const file = fileInput.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onloadend = () => {
                preview.src = reader.result;
                predictImage(file);
            };
            reader.readAsDataURL(file);
        }

        function predictImage(file){
            loader.style.display = "block";
            resultContainer.style.display = "none";
            submitButton.disabled = true;

            const formData = new FormData();
            formData.append('leaf_image', file);

            fetch('/predict', { method:'POST', body:formData })
                .then(response => response.json())
                .then(data => {
                    loader.style.display = "none";
                    submitButton.disabled = false;
                    displayResult(data);
                })
                .catch(err => {
                    loader.style.display = "none";
                    submitButton.disabled = false;
                    errorMsg.innerText = "Prediction failed. Try again.";
                    console.error(err);
                });
        }

        fileInput.addEventListener('change', previewFileAndPredict);

        // Optional manual submit (backup)
        document.getElementById('leaf-form').addEventListener('submit', function(e){
            e.preventDefault();
            const file = fileInput.files[0];
            if(file) predictImage(file);
        });
    </script>
</body>
</html>
